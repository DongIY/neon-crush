<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>霓虹粉碎 · Neon Crush</title>
  <meta name="description" content="赛博朋克风格的方块消除休闲游戏">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --border: #2a2a4a;
      --text: #e0e0ff;
      --text-dim: #6a6a9a;
      --neon-pink: #ff2d7a;
      --neon-blue: #00d4ff;
      --neon-green: #00ff88;
      --neon-purple: #b44aff;
      --neon-orange: #ff8800;
      --neon-yellow: #ffdd00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* 背景网格 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* 扫描线 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px
      );
    }

    /* ===== 主菜单 ===== */
    #menu-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
      transition: opacity 0.5s, visibility 0.5s;
    }

    #menu-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }

    .menu-glow-1 { top: 10%; left: 20%; background: var(--neon-pink); }
    .menu-glow-2 { bottom: 15%; right: 15%; background: var(--neon-blue); }

    .menu-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(255,45,122,0.3));
    }

    .menu-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .menu-btn {
      display: block;
      width: 240px;
      padding: 14px;
      margin-bottom: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 2px solid;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      z-index: 1;
    }

    .menu-btn-play {
      color: var(--neon-blue);
      border-color: var(--neon-blue);
    }

    .menu-btn-play:hover {
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1);
    }

    .menu-btn-endless {
      color: var(--neon-purple);
      border-color: var(--neon-purple);
    }

    .menu-btn-endless:hover {
      background: rgba(180,74,255,0.1);
      box-shadow: 0 0 20px rgba(180,74,255,0.3), inset 0 0 20px rgba(180,74,255,0.1);
    }

    .menu-highscore {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-dim);
      position: relative;
      z-index: 1;
    }

    .menu-highscore strong {
      color: var(--neon-yellow);
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
    }

    /* ===== 游戏 HUD ===== */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      padding: 12px;
      position: relative;
      z-index: 1;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .hud-item {
      text-align: center;
    }

    .hud-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .hud-score .hud-value { color: var(--neon-yellow); }
    .hud-combo .hud-value { color: var(--neon-pink); }
    .hud-level .hud-value { color: var(--neon-blue); }
    .hud-moves .hud-value { color: var(--neon-green); }

    .hud-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .hud-btn:hover {
      color: var(--neon-pink);
      border-color: var(--neon-pink);
    }

    /* 进度条 */
    .level-progress {
      width: 100%;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .level-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ===== 游戏板 ===== */
    #board {
      display: grid;
      gap: 3px;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      box-shadow: 0 0 40px rgba(0,212,255,0.05);
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.3s, filter 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 3.5vw, 22px);
      user-select: none;
      -webkit-user-select: none;
    }

    .cell:hover {
      transform: scale(1.08);
      filter: brightness(1.3);
      z-index: 2;
    }

    .cell:active {
      transform: scale(0.95);
    }

    .cell.highlighted {
      animation: cellGlow 0.5s ease infinite alternate;
    }

    @keyframes cellGlow {
      from { filter: brightness(1); }
      to { filter: brightness(1.5) drop-shadow(0 0 8px currentColor); }
    }

    .cell.removing {
      animation: cellPop 0.3s ease forwards;
    }

    @keyframes cellPop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    .cell.falling {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cell.spawning {
      animation: cellSpawn 0.3s ease;
    }

    @keyframes cellSpawn {
      from { transform: scale(0) rotate(180deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }

    /* 方块颜色 */
    .cell-0 { background: linear-gradient(135deg, #ff1a5e, #ff4d8a); color: #fff; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
    .cell-1 { background: linear-gradient(135deg, #00b8e6, #00e5ff); color: #fff; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
    .cell-2 { background: linear-gradient(135deg, #00cc66, #00ff88); color: #fff; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
    .cell-3 { background: linear-gradient(135deg, #9933ff, #cc66ff); color: #fff; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
    .cell-4 { background: linear-gradient(135deg, #ff6600, #ff9933); color: #fff; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
    .cell-5 { background: linear-gradient(135deg, #e6cc00, #ffee33); color: #333; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15); }

    /* Combo 文字 */
    .combo-popup {
      position: fixed;
      pointer-events: none;
      z-index: 5000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 48px;
      color: var(--neon-pink);
      text-shadow: 0 0 30px var(--neon-pink);
      animation: comboFloat 1s ease forwards;
    }

    @keyframes comboFloat {
      0% { transform: scale(0.5) translateY(0); opacity: 0; }
      30% { transform: scale(1.2) translateY(-10px); opacity: 1; }
      100% { transform: scale(0.8) translateY(-80px); opacity: 0; }
    }

    /* 分数飘字 */
    .score-float {
      position: absolute;
      pointer-events: none;
      z-index: 5000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px var(--neon-yellow);
      animation: scoreUp 0.8s ease forwards;
    }

    @keyframes scoreUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.3); opacity: 0; }
    }

    /* ===== 结算画面 ===== */
    #result-screen {
      position: fixed;
      inset: 0;
      background: rgba(10,10,26,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(10px);
    }

    .result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
      max-width: 320px;
      width: 100%;
    }

    .result-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .result-stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }

    .result-stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--neon-blue);
      margin-top: 4px;
    }

    .result-star {
      font-size: 36px;
      letter-spacing: 8px;
      margin-bottom: 24px;
    }

    .result-new-record {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: var(--neon-pink);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
      animation: blink 1s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .result-btns {
      display: flex;
      gap: 12px;
    }

    .result-btn {
      padding: 12px 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-btn-retry {
      color: var(--neon-blue);
      border-color: var(--neon-blue);
    }

    .result-btn-retry:hover {
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 15px rgba(0,212,255,0.3);
    }

    .result-btn-menu {
      color: var(--text-dim);
      border-color: var(--border);
    }

    .result-btn-menu:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    /* 屏幕闪光 */
    .screen-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 8000;
      animation: flashAnim 0.3s ease forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 震屏 */
    .shake {
      animation: shakeAnim 0.3s ease;
    }

    @keyframes shakeAnim {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    /* 响应式 */
    @media (max-width: 420px) {
      .hud { padding: 6px 10px; }
      .hud-value { font-size: 16px; }
      .hud-label { font-size: 9px; }
      #board { padding: 4px; gap: 2px; }
    }

    @media (min-height: 800px) {
      #board { gap: 4px; padding: 10px; }
    }
  </style>
</head>
<body>

<!-- 主菜单 -->
<div id="menu-screen">
  <div class="menu-glow menu-glow-1"></div>
  <div class="menu-glow menu-glow-2"></div>
  <div class="menu-title">NEON CRUSH</div>
  <div class="menu-subtitle">霓虹粉碎</div>
  <button class="menu-btn menu-btn-play" onclick="Game.start('classic')">▶ 经典模式</button>
  <button class="menu-btn menu-btn-endless" onclick="Game.start('endless')">∞ 无尽模式</button>
  <div class="menu-highscore" id="menu-highscore"></div>
</div>

<!-- 游戏画面 -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-item hud-score">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-item hud-combo">
      <div class="hud-label">Combo</div>
      <div class="hud-value" id="hud-combo">0</div>
    </div>
    <div class="hud-item hud-level">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
    <div class="hud-item hud-moves">
      <div class="hud-label" id="hud-moves-label">Moves</div>
      <div class="hud-value" id="hud-moves">30</div>
    </div>
    <button class="hud-btn" onclick="Game.pause()" title="暂停">⏸</button>
  </div>
  <div class="level-progress">
    <div class="level-progress-fill" id="level-progress" style="width:0%"></div>
  </div>
  <div id="board"></div>
</div>

<!-- 结算画面 -->
<div id="result-screen">
  <div class="result-title" id="result-title">GAME OVER</div>
  <div class="result-subtitle" id="result-subtitle"></div>
  <div class="result-star" id="result-stars"></div>
  <div class="result-new-record" id="result-record" style="display:none">★ NEW RECORD ★</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-label">Score</div>
      <div class="result-stat-value" id="result-score">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Max Combo</div>
      <div class="result-stat-value" id="result-combo">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Blocks</div>
      <div class="result-stat-value" id="result-blocks">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Level</div>
      <div class="result-stat-value" id="result-level">1</div>
    </div>
  </div>
  <div class="result-btns">
    <button class="result-btn result-btn-retry" id="result-retry">↻ RETRY</button>
    <button class="result-btn result-btn-menu" onclick="Game.toMenu()">MENU</button>
  </div>
</div>

<script>
// ===== 音频引擎 =====
const Audio = (() => {
  let ctx = null;
  let enabled = true;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function pop() {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = 'sine';
    o.frequency.value = 600 + Math.random() * 400;
    g.gain.setValueAtTime(0.06, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.1);
  }

  function combo(level) {
    if (!enabled) return;
    const c = getCtx();
    const base = 400 + level * 80;
    [0, 0.08, 0.16].forEach((d, i) => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = 'sine';
      o.frequency.value = base + i * 120;
      g.gain.setValueAtTime(0.05, c.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d + 0.2);
      o.connect(g).connect(c.destination);
      o.start(c.currentTime + d); o.stop(c.currentTime + d + 0.2);
    });
  }

  function levelUp() {
    if (!enabled) return;
    const c = getCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.06, c.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.4);
      o.connect(g).connect(c.destination);
      o.start(c.currentTime + i * 0.12);
      o.stop(c.currentTime + i * 0.12 + 0.4);
    });
  }

  function fail() {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.4);
    g.gain.setValueAtTime(0.04, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.5);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.5);
  }

  function click() {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = 'sine';
    o.frequency.value = 1200;
    g.gain.setValueAtTime(0.03, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.03);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.03);
  }

  return { pop, combo, levelUp, fail, click, getCtx };
})();

// ===== 游戏核心 =====
const Game = (() => {
  const COLS = 8;
  const ROWS = 10;
  const COLORS = 6;
  const ICONS = ['💎', '🔷', '🟢', '🔮', '🔥', '⚡'];
  const COLOR_NAMES = ['pink', 'blue', 'green', 'purple', 'orange', 'yellow'];

  let grid = [];
  let score = 0;
  let combo = 0;
  let maxCombo = 0;
  let level = 1;
  let moves = 30;
  let totalBlocks = 0;
  let levelTarget = 500;
  let levelScore = 0;
  let mode = 'classic';
  let processing = false;
  let gameOver = false;

  const boardEl = document.getElementById('board');

  function start(gameMode) {
    mode = gameMode;
    score = 0;
    combo = 0;
    maxCombo = 0;
    level = 1;
    moves = mode === 'classic' ? 30 : 999;
    totalBlocks = 0;
    levelTarget = 500;
    levelScore = 0;
    processing = false;
    gameOver = false;

    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('result-screen').style.display = 'none';

    if (mode === 'endless') {
      document.getElementById('hud-moves-label').textContent = 'TIME';
    } else {
      document.getElementById('hud-moves-label').textContent = 'MOVES';
    }

    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
    boardEl.style.width = Math.min(window.innerWidth - 24, 420) + 'px';

    initGrid();
    render();
    updateHUD();
    updateHighscoreDisplay();
  }

  function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = Math.floor(Math.random() * COLORS);
      }
    }
    // 确保没有初始的大型同色连通块（>= 10 个），避免开局就能一击得分过高
    let tries = 0;
    while (tries < 50) {
      let largeGroup = false;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const group = findGroup(r, c);
          if (group.length >= 10) {
            largeGroup = true;
            // 打散这个组中的一些格子
            for (let i = 5; i < group.length; i++) {
              grid[group[i][0]][group[i][1]] = Math.floor(Math.random() * COLORS);
            }
          }
        }
      }
      if (!largeGroup) break;
      tries++;
    }
  }

  function findGroup(row, col) {
    const color = grid[row][col];
    if (color === -1) return [];
    const visited = new Set();
    const stack = [[row, col]];
    const group = [];

    while (stack.length > 0) {
      const [r, c] = stack.pop();
      const key = r * COLS + c;
      if (visited.has(key)) continue;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (grid[r][c] !== color) continue;
      visited.add(key);
      group.push([r, c]);
      stack.push([r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]);
    }

    return group;
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = `cell cell-${grid[r][c]}`;
        cell.dataset.row = r;
        cell.dataset.col = c;
        if (grid[r][c] >= 0 && grid[r][c] < ICONS.length) {
          cell.textContent = ICONS[grid[r][c]];
        }
        cell.addEventListener('click', () => onCellClick(r, c));
        cell.addEventListener('mouseenter', () => onCellHover(r, c));
        cell.addEventListener('mouseleave', () => clearHighlights());
        boardEl.appendChild(cell);
      }
    }
  }

  function onCellHover(row, col) {
    if (processing || gameOver) return;
    clearHighlights();
    const group = findGroup(row, col);
    if (group.length >= 2) {
      group.forEach(([r, c]) => {
        const idx = r * COLS + c;
        const cell = boardEl.children[idx];
        if (cell) cell.classList.add('highlighted');
      });
    }
  }

  function clearHighlights() {
    boardEl.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
  }

  function onCellClick(row, col) {
    if (processing || gameOver) return;

    const group = findGroup(row, col);
    if (group.length < 2) {
      Audio.click();
      // 震一下提示不能消
      const idx = row * COLS + col;
      const cell = boardEl.children[idx];
      if (cell) {
        cell.style.animation = 'none';
        cell.offsetHeight;
        cell.classList.add('shake');
        setTimeout(() => cell.classList.remove('shake'), 300);
      }
      return;
    }

    processing = true;

    // 计算得分
    const n = group.length;
    const baseScore = n * n * 10;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    const comboMultiplier = Math.min(combo, 10);
    const points = baseScore * comboMultiplier;
    score += points;
    levelScore += points;
    totalBlocks += n;

    if (mode === 'classic') {
      moves--;
    }

    // 音效
    if (n >= 8) {
      Audio.combo(Math.min(combo, 5));
    } else {
      Audio.pop();
    }

    // 显示分数飘字
    showScoreFloat(row, col, points);

    // Combo 提示
    if (combo >= 3) {
      showComboPopup(combo);
    }

    // 大消除屏幕闪光
    if (n >= 6) {
      const color = grid[row][col];
      showScreenFlash(color);
    }

    // 消除动画
    group.forEach(([r, c]) => {
      const idx = r * COLS + c;
      const cell = boardEl.children[idx];
      if (cell) cell.classList.add('removing');
    });

    setTimeout(() => {
      // 清除格子
      group.forEach(([r, c]) => {
        grid[r][c] = -1;
      });

      // 下落
      applyGravity();

      // 填充新方块
      fillEmpty();

      render();
      updateHUD();

      // 检查升级
      if (levelScore >= levelTarget) {
        levelUp();
      }

      // 重置 combo 计时器
      resetComboTimer();

      // 检查游戏是否结束
      setTimeout(() => {
        processing = false;
        checkGameOver();
      }, 100);
    }, 300);
  }

  let comboTimer = null;

  function resetComboTimer() {
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      combo = 0;
      updateHUD();
    }, 3000);
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let writePos = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== -1) {
          grid[writePos][c] = grid[r][c];
          if (writePos !== r) grid[r][c] = -1;
          writePos--;
        }
      }
      // 空位填 -1
      for (let r = writePos; r >= 0; r--) {
        grid[r][c] = -1;
      }
    }
  }

  function fillEmpty() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === -1) {
          grid[r][c] = Math.floor(Math.random() * COLORS);
        }
      }
    }
  }

  function levelUp() {
    level++;
    levelScore = 0;
    levelTarget = Math.floor(levelTarget * 1.5);
    Audio.levelUp();

    // 全屏闪光
    showScreenFlash(-1);

    // 经典模式补充步数
    if (mode === 'classic') {
      moves += 5;
    }
  }

  function checkGameOver() {
    if (gameOver) return;

    // 经典模式：步数耗尽
    if (mode === 'classic' && moves <= 0) {
      endGame();
      return;
    }

    // 检查是否还有可消除的组
    let hasMove = false;
    for (let r = 0; r < ROWS && !hasMove; r++) {
      for (let c = 0; c < COLS && !hasMove; c++) {
        const group = findGroup(r, c);
        if (group.length >= 2) hasMove = true;
      }
    }

    if (!hasMove) {
      // 重新洗牌
      shuffleBoard();
    }
  }

  function shuffleBoard() {
    // 收集所有颜色
    const colors = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        colors.push(grid[r][c]);
      }
    }

    // Fisher-Yates 洗牌
    for (let i = colors.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [colors[i], colors[j]] = [colors[j], colors[i]];
    }

    let idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = colors[idx++];
      }
    }

    render();

    // 如果洗牌后还是没有可消除的，游戏结束
    let hasMove = false;
    for (let r = 0; r < ROWS && !hasMove; r++) {
      for (let c = 0; c < COLS && !hasMove; c++) {
        if (findGroup(r, c).length >= 2) hasMove = true;
      }
    }

    if (!hasMove) {
      endGame();
    }
  }

  function endGame() {
    gameOver = true;
    Audio.fail();

    setTimeout(() => {
      showResult();
    }, 500);
  }

  function showResult() {
    document.getElementById('game-screen').style.display = 'none';
    const resultEl = document.getElementById('result-screen');
    resultEl.style.display = 'flex';

    document.getElementById('result-title').textContent = score >= levelTarget ? 'EXCELLENT!' : 'GAME OVER';
    document.getElementById('result-subtitle').textContent =
      mode === 'classic' ? '经典模式' : '无尽模式';

    document.getElementById('result-score').textContent = score.toLocaleString();
    document.getElementById('result-combo').textContent = maxCombo + 'x';
    document.getElementById('result-blocks').textContent = totalBlocks;
    document.getElementById('result-level').textContent = level;

    // 星级
    const stars = score >= 5000 ? 3 : score >= 2000 ? 2 : score >= 500 ? 1 : 0;
    document.getElementById('result-stars').textContent =
      '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

    // 检查最高分
    const key = `neon-crush-highscore-${mode}`;
    const prev = parseInt(localStorage.getItem(key) || '0');
    const isNewRecord = score > prev;
    if (isNewRecord) {
      localStorage.setItem(key, String(score));
    }
    document.getElementById('result-record').style.display = isNewRecord ? 'block' : 'none';

    document.getElementById('result-retry').onclick = () => start(mode);
  }

  function updateHUD() {
    document.getElementById('hud-score').textContent = score.toLocaleString();
    document.getElementById('hud-combo').textContent = combo > 0 ? combo + 'x' : '—';
    document.getElementById('hud-level').textContent = level;
    document.getElementById('hud-moves').textContent = mode === 'endless' ? '∞' : moves;

    const pct = Math.min((levelScore / levelTarget) * 100, 100);
    document.getElementById('level-progress').style.width = pct + '%';
  }

  function showScoreFloat(row, col, points) {
    const boardRect = boardEl.getBoundingClientRect();
    const cellW = boardRect.width / COLS;
    const cellH = boardRect.height / ROWS;
    const x = boardRect.left + col * cellW + cellW / 2;
    const y = boardRect.top + row * cellH;

    const el = document.createElement('div');
    el.className = 'score-float';
    el.textContent = '+' + points;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function showComboPopup(c) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.textContent = c + 'x COMBO!';
    el.style.left = '50%';
    el.style.top = '40%';
    el.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function showScreenFlash(colorIdx) {
    const colors = ['rgba(255,45,122,0.15)', 'rgba(0,212,255,0.15)', 'rgba(0,255,136,0.15)',
                    'rgba(180,74,255,0.15)', 'rgba(255,136,0,0.15)', 'rgba(255,221,0,0.15)'];
    const c = colorIdx >= 0 && colorIdx < colors.length ? colors[colorIdx] : 'rgba(255,255,255,0.1)';
    const el = document.createElement('div');
    el.className = 'screen-flash';
    el.style.background = `radial-gradient(ellipse at center, ${c} 0%, transparent 70%)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 300);
  }

  function pause() {
    if (gameOver) return;
    if (confirm('暂停中\n\n返回主菜单？')) {
      toMenu();
    }
  }

  function toMenu() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('menu-screen').classList.remove('hidden');
    updateHighscoreDisplay();
  }

  function updateHighscoreDisplay() {
    const classicHigh = parseInt(localStorage.getItem('neon-crush-highscore-classic') || '0');
    const endlessHigh = parseInt(localStorage.getItem('neon-crush-highscore-endless') || '0');
    const el = document.getElementById('menu-highscore');
    if (classicHigh > 0 || endlessHigh > 0) {
      let html = '';
      if (classicHigh > 0) html += `经典最高分 <strong>${classicHigh.toLocaleString()}</strong>`;
      if (classicHigh > 0 && endlessHigh > 0) html += ' · ';
      if (endlessHigh > 0) html += `无尽最高分 <strong>${endlessHigh.toLocaleString()}</strong>`;
      el.innerHTML = html;
    } else {
      el.innerHTML = '点击开始你的第一局游戏';
    }
  }

  // 初始化
  updateHighscoreDisplay();

  // 监听窗口 resize，调整棋盘大小
  window.addEventListener('resize', () => {
    if (document.getElementById('game-screen').style.display === 'flex') {
      boardEl.style.width = Math.min(window.innerWidth - 24, 420) + 'px';
    }
  });

  return { start, pause, toMenu };
})();
</script>
