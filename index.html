<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>霓虹粉碎 · Neon Crush</title>
  <meta name="description" content="赛博朋克风格的宝石消除休闲游戏">
  <meta name="theme-color" content="#0a0a1a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --border: #2a2a4a;
      --text: #e0e0ff;
      --text-dim: #6a6a9a;
      --neon-pink: #ff2d7a;
      --neon-blue: #00d4ff;
      --neon-green: #00ff88;
      --neon-purple: #b44aff;
      --neon-orange: #ff8800;
      --neon-yellow: #ffdd00;
      --neon-red: #ff3333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
    }

    /* ===== 主菜单 ===== */
    #menu-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; background: var(--bg);
      transition: opacity 0.5s, visibility 0.5s;
    }
    #menu-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .menu-glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(120px); opacity: 0.15;
      pointer-events: none;
    }
    .menu-glow-1 { top: 10%; left: 20%; background: var(--neon-pink); }
    .menu-glow-2 { bottom: 15%; right: 15%; background: var(--neon-blue); }

    .menu-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900; text-align: center;
      margin-bottom: 8px; position: relative; z-index: 1;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,45,122,0.3));
    }

    .menu-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; color: var(--text-dim);
      letter-spacing: 6px; text-transform: uppercase;
      margin-bottom: 48px; position: relative; z-index: 1;
    }

    .menu-gems {
      display: flex; gap: 12px;
      margin-bottom: 36px;
      position: relative; z-index: 1;
    }
    .menu-gems svg {
      width: 40px; height: 40px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
      animation: menuGemFloat 3s ease-in-out infinite;
    }
    .menu-gems svg:nth-child(2) { animation-delay: 0.5s; }
    .menu-gems svg:nth-child(3) { animation-delay: 1s; }
    .menu-gems svg:nth-child(4) { animation-delay: 1.5s; }
    .menu-gems svg:nth-child(5) { animation-delay: 2s; }
    .menu-gems svg:nth-child(6) { animation-delay: 2.5s; }

    @keyframes menuGemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .menu-btn {
      display: block; width: 260px; padding: 14px;
      margin-bottom: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      border: 2px solid; border-radius: 8px;
      background: transparent; cursor: pointer;
      transition: all 0.2s;
      position: relative; z-index: 1;
    }

    .menu-btn-play { color: var(--neon-blue); border-color: var(--neon-blue); }
    .menu-btn-play:hover {
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1);
    }
    .menu-btn-endless { color: var(--neon-purple); border-color: var(--neon-purple); }
    .menu-btn-endless:hover {
      background: rgba(180,74,255,0.1);
      box-shadow: 0 0 20px rgba(180,74,255,0.3), inset 0 0 20px rgba(180,74,255,0.1);
    }

    .menu-highscore {
      margin-top: 32px; font-size: 12px;
      color: var(--text-dim); position: relative; z-index: 1;
    }
    .menu-highscore strong {
      color: var(--neon-yellow);
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
    }

    /* ===== 游戏 HUD ===== */
    #game-screen {
      display: none; flex-direction: column;
      align-items: center; width: 100%;
      max-width: 500px; padding: 8px 12px;
      position: relative; z-index: 1;
    }

    .hud {
      display: flex; align-items: center;
      justify-content: space-between;
      width: 100%; margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .hud-item { text-align: center; }
    .hud-label {
      font-size: 9px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }
    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 700;
    }

    .hud-score .hud-value { color: var(--neon-yellow); }
    .hud-combo .hud-value { color: var(--neon-pink); }
    .hud-level .hud-value { color: var(--neon-blue); }
    .hud-moves .hud-value { color: var(--neon-green); }

    .hud-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); padding: 6px 10px;
      border-radius: 4px; font-size: 16px;
      cursor: pointer; transition: all 0.2s;
    }
    .hud-btn:hover { color: var(--neon-pink); border-color: var(--neon-pink); }

    /* 关卡目标区域 */
    .level-objective {
      width: 100%; padding: 8px 12px;
      margin-bottom: 8px;
      background: rgba(18,18,42,0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center;
      gap: 12px;
    }
    .obj-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: rgba(255,221,0,0.1);
      border-radius: 8px; flex-shrink: 0;
    }
    .obj-info { flex: 1; min-width: 0; }
    .obj-title {
      font-size: 11px; font-weight: 700;
      color: var(--neon-yellow);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }
    .obj-desc {
      font-size: 12px; color: var(--text-dim);
      margin-top: 2px;
    }
    .obj-progress-bar {
      width: 100%; height: 4px;
      background: rgba(42,42,74,0.8);
      border-radius: 2px;
      margin-top: 4px; overflow: hidden;
    }
    .obj-progress-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .obj-progress-fill.complete {
      background: linear-gradient(90deg, var(--neon-yellow), var(--neon-orange));
    }
    .obj-count {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--neon-blue);
      flex-shrink: 0;
    }
    .obj-count.done { color: var(--neon-green); }

    /* 进度条 */
    .level-progress {
      width: 100%; height: 4px;
      background: var(--surface);
      border-radius: 2px; margin-bottom: 8px;
      overflow: hidden;
    }
    .level-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border-radius: 2px; transition: width 0.3s ease;
    }

    /* ===== 游戏板 ===== */
    #board {
      display: grid; gap: 3px; padding: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      box-shadow: 0 0 40px rgba(0,212,255,0.05);
    }

    .cell {
      width: 100%; aspect-ratio: 1;
      border-radius: 6px; cursor: pointer;
      transition: transform 0.15s, opacity 0.3s, filter 0.2s;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      overflow: hidden;
    }

    .cell svg {
      width: 80%; height: 80%;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
      transition: filter 0.2s;
    }

    .cell:hover { transform: scale(1.08); z-index: 2; }
    .cell:hover svg { filter: drop-shadow(0 2px 6px rgba(255,255,255,0.3)) brightness(1.2); }
    .cell:active { transform: scale(0.95); }

    .cell.highlighted { animation: cellGlow 0.5s ease infinite alternate; }
    @keyframes cellGlow {
      from { filter: brightness(1); }
      to { filter: brightness(1.4) drop-shadow(0 0 10px currentColor); }
    }

    .cell.removing { animation: cellPop 0.35s ease forwards; }
    @keyframes cellPop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4) rotate(15deg); opacity: 0.8; }
      100% { transform: scale(0) rotate(45deg); opacity: 0; }
    }

    .cell.spawning { animation: cellSpawn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cellSpawn {
      from { transform: scale(0) translateY(-20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* 宝石底色 */
    .cell-0 { background: linear-gradient(135deg, #cc0033, #ff1a5e); }
    .cell-1 { background: linear-gradient(135deg, #0066cc, #00aaff); }
    .cell-2 { background: linear-gradient(135deg, #00994d, #00dd6e); }
    .cell-3 { background: linear-gradient(135deg, #7700cc, #aa44ff); }
    .cell-4 { background: linear-gradient(135deg, #cc6600, #ff9922); }
    .cell-5 { background: linear-gradient(135deg, #999900, #cccc00); }

    /* Combo 文字 */
    .combo-popup {
      position: fixed; pointer-events: none; z-index: 5000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: 48px;
      color: var(--neon-pink);
      text-shadow: 0 0 30px var(--neon-pink);
      animation: comboFloat 1s ease forwards;
    }
    @keyframes comboFloat {
      0% { transform: scale(0.5) translateY(0); opacity: 0; }
      30% { transform: scale(1.2) translateY(-10px); opacity: 1; }
      100% { transform: scale(0.8) translateY(-80px); opacity: 0; }
    }

    /* 分数飘字 */
    .score-float {
      position: absolute; pointer-events: none; z-index: 5000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700; font-size: 16px;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px var(--neon-yellow);
      animation: scoreUp 0.8s ease forwards;
    }
    @keyframes scoreUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.3); opacity: 0; }
    }

    /* 关卡通过弹窗 */
    .level-up-banner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 6000;
      text-align: center;
      animation: levelUpAnim 1.8s ease forwards;
    }
    .level-up-banner .lu-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px; font-weight: 900;
      background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .level-up-banner .lu-sub {
      font-size: 14px; color: var(--text-dim);
      margin-top: 4px;
    }
    @keyframes levelUpAnim {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    /* ===== 结算画面 ===== */
    #result-screen {
      position: fixed; inset: 0;
      background: rgba(10,10,26,0.95);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(10px);
    }

    .result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px; font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .result-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }

    .result-stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 32px;
      max-width: 320px; width: 100%;
    }
    .result-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; text-align: center;
    }
    .result-stat-label {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }
    .result-stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px; font-weight: 700;
      color: var(--neon-blue); margin-top: 4px;
    }

    .result-star { font-size: 36px; letter-spacing: 8px; margin-bottom: 24px; }

    .result-new-record {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; color: var(--neon-pink);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 24px; animation: blink 1s ease infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .result-btns { display: flex; gap: 12px; }
    .result-btn {
      padding: 12px 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      border: 2px solid; border-radius: 8px;
      background: transparent; cursor: pointer;
      transition: all 0.2s;
    }
    .result-btn-retry { color: var(--neon-blue); border-color: var(--neon-blue); }
    .result-btn-retry:hover {
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 15px rgba(0,212,255,0.3);
    }
    .result-btn-menu { color: var(--text-dim); border-color: var(--border); }
    .result-btn-menu:hover { color: var(--text); border-color: var(--text-dim); }

    /* 屏幕闪光 & 震屏 */
    .screen-flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 8000;
      animation: flashAnim 0.3s ease forwards;
    }
    @keyframes flashAnim { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

    .shake { animation: shakeAnim 0.3s ease; }
    @keyframes shakeAnim {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    /* 目标完成闪光 */
    .obj-complete-flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 7000;
      animation: objFlash 0.6s ease forwards;
    }
    @keyframes objFlash {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 420px) {
      .hud { padding: 6px 8px; }
      .hud-value { font-size: 14px; }
      .hud-label { font-size: 8px; }
      #board { padding: 4px; gap: 2px; }
      .level-objective { padding: 6px 10px; gap: 8px; }
      .obj-icon { width: 28px; height: 28px; font-size: 16px; }
    }
  </style>
</head>
<body>

<!-- 主菜单 -->
<div id="menu-screen">
  <div class="menu-glow menu-glow-1"></div>
  <div class="menu-glow menu-glow-2"></div>
  <div class="menu-title">NEON CRUSH</div>
  <div class="menu-subtitle">霓虹粉碎</div>
  <div class="menu-gems" id="menu-gems"></div>
  <button class="menu-btn menu-btn-play" onclick="Game.start('classic')">▶ 经典模式</button>
  <button class="menu-btn menu-btn-endless" onclick="Game.start('endless')">∞ 无尽模式</button>
  <div class="menu-highscore" id="menu-highscore"></div>
</div>

<!-- 游戏画面 -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-item hud-score">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-item hud-combo">
      <div class="hud-label">Combo</div>
      <div class="hud-value" id="hud-combo">—</div>
    </div>
    <div class="hud-item hud-level">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
    <div class="hud-item hud-moves">
      <div class="hud-label" id="hud-moves-label">Moves</div>
      <div class="hud-value" id="hud-moves">30</div>
    </div>
    <button class="hud-btn" onclick="Game.pause()" title="暂停">⏸</button>
  </div>
  <div class="level-objective" id="level-objective">
    <div class="obj-icon" id="obj-icon">🎯</div>
    <div class="obj-info">
      <div class="obj-title" id="obj-title">LEVEL 1</div>
      <div class="obj-desc" id="obj-desc">消除 30 个宝石</div>
      <div class="obj-progress-bar"><div class="obj-progress-fill" id="obj-progress" style="width:0%"></div></div>
    </div>
    <div class="obj-count" id="obj-count">0/30</div>
  </div>
  <div class="level-progress">
    <div class="level-progress-fill" id="level-progress" style="width:0%"></div>
  </div>
  <div id="board"></div>
</div>

<!-- 结算画面 -->
<div id="result-screen">
  <div class="result-title" id="result-title">GAME OVER</div>
  <div class="result-subtitle" id="result-subtitle"></div>
  <div class="result-star" id="result-stars"></div>
  <div class="result-new-record" id="result-record" style="display:none">★ NEW RECORD ★</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-label">Score</div>
      <div class="result-stat-value" id="result-score">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Max Combo</div>
      <div class="result-stat-value" id="result-combo">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Gems</div>
      <div class="result-stat-value" id="result-blocks">0</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-label">Level</div>
      <div class="result-stat-value" id="result-level">1</div>
    </div>
  </div>
  <div class="result-btns">
    <button class="result-btn result-btn-retry" id="result-retry">↻ RETRY</button>
    <button class="result-btn result-btn-menu" onclick="Game.toMenu()">MENU</button>
  </div>
</div>

<script>
// ===== SVG 宝石图标系统 =====
const GemSVG = (() => {
  // 6种统一风格的宝石 — 都是切割宝石造型，仅颜色不同
  const gems = [
    // 0: 红宝石 (Ruby) — 菱形切割
    (w=32,h=32) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}">
      <defs>
        <linearGradient id="r1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff4466"/>
          <stop offset="50%" stop-color="#cc0033"/>
          <stop offset="100%" stop-color="#990022"/>
        </linearGradient>
      </defs>
      <polygon points="16,2 30,12 26,28 6,28 2,12" fill="url(#r1)" stroke="#ff6688" stroke-width="0.5"/>
      <polygon points="16,2 30,12 16,16 2,12" fill="#ff5577" opacity="0.6"/>
      <polygon points="16,16 30,12 26,28" fill="#bb0033" opacity="0.5"/>
      <polygon points="16,2 16,16 2,12" fill="#ff7799" opacity="0.4"/>
      <line x1="16" y1="2" x2="16" y2="16" stroke="#ffaacc" stroke-width="0.3" opacity="0.6"/>
      <polygon points="14,6 18,6 17,10 15,10" fill="#ffffff" opacity="0.35"/>
    </svg>`,

    // 1: 蓝宝石 (Sapphire) — 圆形切割
    (w=32,h=32) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}">
      <defs>
        <radialGradient id="b1" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#66ccff"/>
          <stop offset="50%" stop-color="#0088dd"/>
          <stop offset="100%" stop-color="#003366"/>
        </radialGradient>
      </defs>
      <circle cx="16" cy="16" r="13" fill="url(#b1)" stroke="#44aaff" stroke-width="0.5"/>
      <ellipse cx="16" cy="13" rx="10" ry="8" fill="#0099ee" opacity="0.3"/>

// ===== 音频引擎 =====
const SFX = (() => {
  let ctx = null;
  let enabled = true;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function pop(pitch) {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine';
    o.frequency.value = 500 + (pitch || 0) * 80 + Math.random() * 100;
    g.gain.setValueAtTime(0.06, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.12);
  }

  function combo(level) {
    if (!enabled) return;
    const c = getCtx();
    const base = 400 + level * 80;
    [0, 0.08, 0.16].forEach((d, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.value = base + i * 120;
      g.gain.setValueAtTime(0.05, c.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d + 0.2);
      o.connect(g).connect(c.destination);
      o.start(c.currentTime + d); o.stop(c.currentTime + d + 0.2);
    });
  }

  function levelUp() {
    if (!enabled) return;
    const c = getCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.06, c.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.4);
      o.connect(g).connect(c.destination);
      o.start(c.currentTime + i * 0.12);
      o.stop(c.currentTime + i * 0.12 + 0.4);
    });
  }

  function objectiveComplete() {
    if (!enabled) return;
    const c = getCtx();
    [784, 988, 1175, 1568].forEach((f, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.05, c.currentTime + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.1 + 0.5);
      o.connect(g).connect(c.destination);
      o.start(c.currentTime + i * 0.1);
      o.stop(c.currentTime + i * 0.1 + 0.5);
    });
  }

  function fail() {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.4);
    g.gain.setValueAtTime(0.04, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.5);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.5);
  }

  function click() {
    if (!enabled) return;
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine';
    o.frequency.value = 1200;
    g.gain.setValueAtTime(0.03, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.03);
    o.connect(g).connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.03);
  }

  return { pop, combo, levelUp, objectiveComplete, fail, click, getCtx };
})();

// ===== 关卡目标系统 =====
const Objectives = (() => {
  // 目标类型
  const TYPES = {
    GEMS_TOTAL: 'gems_total',       // 消除N个宝石
    GEMS_COLOR: 'gems_color',       // 消除N个指定颜色宝石
    SCORE: 'score',                 // 达到N分
    BIG_MATCH: 'big_match',         // 一次消除N个以上
    COMBO: 'combo',                 // 达到Nx combo
  };

  const COLOR_NAMES = ['红宝石', '蓝宝石', '翡翠', '紫水晶', '黄玉', '白钻'];
  const COLOR_ICONS = ['🔴', '🔵', '🟢', '🟣', '🟠', '⚪'];

  // 关卡目标配置
  function getObjective(level) {
    const pool = [];

    if (level <= 3) {
      // 前3关：简单的消除数量
      const target = 20 + level * 10;
      return { type: TYPES.GEMS_TOTAL, target, current: 0, icon: '💎', desc: `消除 ${target} 个宝石` };
    }

    if (level % 5 === 0) {
      // 每5关：分数目标
      const target = level * 300;
      return { type: TYPES.SCORE, target, current: 0, icon: '⭐', desc: `获得 ${target.toLocaleString()} 分` };
    }

    if (level % 3 === 0) {
      // 每3关：大消除挑战
      const target = 2 + Math.floor(level / 5);
      const size = 5 + Math.floor(level / 8);
      return { type: TYPES.BIG_MATCH, target, current: 0, extra: size, icon: '💥', desc: `完成 ${target} 次 ${size}+ 连消` };
    }

    if (level % 4 === 0) {
      // 每4关：combo 挑战
      const target = 3 + Math.floor(level / 6);
      return { type: TYPES.COMBO, target, current: 0, icon: '🔥', desc: `达到 ${target}x Combo` };
    }

    // 默认：指定颜色消除
    const colorIdx = (level - 1) % 6;
    const target = 15 + level * 5;
    return {
      type: TYPES.GEMS_COLOR, target, current: 0, extra: colorIdx,
      icon: COLOR_ICONS[colorIdx],
      desc: `消除 ${target} 个${COLOR_NAMES[colorIdx]}`
    };
  }

  return { TYPES, getObjective };
})();

// ===== 游戏核心 =====
const Game = (() => {
  const COLS = 8, ROWS = 10, COLORS = 6;

  let grid = [], score = 0, combo = 0, maxCombo = 0;
  let level = 1, moves = 30, totalBlocks = 0;
  let levelTarget = 500, levelScore = 0;
  let mode = 'classic', processing = false, gameOver = false;
  let objective = null, objectiveComplete = false;
  let colorCounts = [0,0,0,0,0,0]; // 每种颜色消除计数

  const boardEl = document.getElementById('board');

  function start(gameMode) {
    mode = gameMode;
    score = 0; combo = 0; maxCombo = 0;
    level = 1; moves = mode === 'classic' ? 30 : 999;
    totalBlocks = 0; levelTarget = 500; levelScore = 0;
    processing = false; gameOver = false;
    objectiveComplete = false;
    colorCounts = [0,0,0,0,0,0];

    objective = mode === 'classic' ? Objectives.getObjective(1) : null;

    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('result-screen').style.display = 'none';

    const objEl = document.getElementById('level-objective');
    if (mode === 'endless') {
      objEl.style.display = 'none';
      document.getElementById('hud-moves-label').textContent = 'TIME';
    } else {
      objEl.style.display = 'flex';
      document.getElementById('hud-moves-label').textContent = 'MOVES';
      updateObjectiveDisplay();
    }

    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
    boardEl.style.width = Math.min(window.innerWidth - 24, 420) + 'px';

    initGrid(); render(); updateHUD();
    updateHighscoreDisplay();
  }

  function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = Math.floor(Math.random() * COLORS);
      }
    }
    let tries = 0;
    while (tries < 50) {
      let largeGroup = false;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (findGroup(r, c).length >= 10) {
            largeGroup = true;
            const group = findGroup(r, c);
            for (let i = 5; i < group.length; i++) {
              grid[group[i][0]][group[i][1]] = Math.floor(Math.random() * COLORS);
            }
          }
        }
      }
      if (!largeGroup) break;
      tries++;
    }
  }

  function findGroup(row, col) {
    const color = grid[row][col];
    if (color === -1) return [];
    const visited = new Set();
    const stack = [[row, col]];
    const group = [];
    while (stack.length > 0) {
      const [r, c] = stack.pop();
      const key = r * COLS + c;
      if (visited.has(key)) continue;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (grid[r][c] !== color) continue;
      visited.add(key);
      group.push([r, c]);
      stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
    }
    return group;
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        const colorIdx = grid[r][c];
        cell.className = `cell cell-${colorIdx}`;
        cell.dataset.row = r;
        cell.dataset.col = c;
        if (colorIdx >= 0 && colorIdx < COLORS) {
          cell.innerHTML = GemSVG.get(colorIdx);
        }
        cell.addEventListener('click', () => onCellClick(r, c));
        cell.addEventListener('mouseenter', () => onCellHover(r, c));
        cell.addEventListener('mouseleave', () => clearHighlights());
        boardEl.appendChild(cell);
      }
    }
  }

  function onCellHover(row, col) {
    if (processing || gameOver) return;
    clearHighlights();
    const group = findGroup(row, col);
    if (group.length >= 2) {
      group.forEach(([r, c]) => {
        const cell = boardEl.children[r * COLS + c];
        if (cell) cell.classList.add('highlighted');
      });
    }
  }

  function clearHighlights() {
    boardEl.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
  }

  function onCellClick(row, col) {
    if (processing || gameOver) return;

    const group = findGroup(row, col);
    if (group.length < 2) {
      SFX.click();
      const cell = boardEl.children[row * COLS + col];
      if (cell) {
        cell.style.animation = 'none';
        cell.offsetHeight;
        cell.classList.add('shake');
        setTimeout(() => cell.classList.remove('shake'), 300);
      }
      return;
    }

    processing = true;
    const n = group.length;
    const colorIdx = grid[row][col];
    const baseScore = n * n * 10;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    const comboMultiplier = Math.min(combo, 10);
    const points = baseScore * comboMultiplier;
    score += points;
    levelScore += points;
    totalBlocks += n;
    colorCounts[colorIdx] += n;

    if (mode === 'classic') moves--;

    // 更新目标
    if (objective && !objectiveComplete) {
      updateObjective(n, colorIdx, points);
    }

    // 音效
    n >= 8 ? SFX.combo(Math.min(combo, 5)) : SFX.pop(colorIdx);

    showScoreFloat(row, col, points);
    if (combo >= 3) showComboPopup(combo);
    if (n >= 6) showScreenFlash(colorIdx);

    group.forEach(([r, c]) => {
      const cell = boardEl.children[r * COLS + c];
      if (cell) cell.classList.add('removing');
    });

    setTimeout(() => {
      group.forEach(([r, c]) => { grid[r][c] = -1; });
      applyGravity();
      fillEmpty();
      render();
      updateHUD();

      if (levelScore >= levelTarget) levelUp();
      resetComboTimer();

      setTimeout(() => {
        processing = false;
        checkGameOver();
      }, 100);
    }, 350);
  }

  function updateObjective(matchSize, colorIdx, points) {
    const obj = objective;
    switch (obj.type) {
      case Objectives.TYPES.GEMS_TOTAL:
        obj.current += matchSize;
        break;
      case Objectives.TYPES.GEMS_COLOR:
        if (colorIdx === obj.extra) obj.current += matchSize;
        break;
      case Objectives.TYPES.SCORE:
        obj.current = score;
        break;
      case Objectives.TYPES.BIG_MATCH:
        if (matchSize >= obj.extra) obj.current++;
        break;
      case Objectives.TYPES.COMBO:
        if (combo > obj.current) obj.current = combo;
        break;
    }

    updateObjectiveDisplay();

    if (obj.current >= obj.target && !objectiveComplete) {
      objectiveComplete = true;
      SFX.objectiveComplete();
      showObjectiveComplete();
    }
  }

  function updateObjectiveDisplay() {
    if (!objective) return;
    const obj = objective;
    document.getElementById('obj-icon').textContent = obj.icon;
    document.getElementById('obj-title').textContent = `LEVEL ${level} 目标`;
    document.getElementById('obj-desc').textContent = obj.desc;

    const pct = Math.min((obj.current / obj.target) * 100, 100);
    const progressEl = document.getElementById('obj-progress');
    progressEl.style.width = pct + '%';
    progressEl.className = 'obj-progress-fill' + (pct >= 100 ? ' complete' : '');

    const countEl = document.getElementById('obj-count');
    const displayCurrent = obj.type === Objectives.TYPES.SCORE
      ? Math.min(obj.current, obj.target).toLocaleString()
      : Math.min(obj.current, obj.target);
    const displayTarget = obj.type === Objectives.TYPES.SCORE
      ? obj.target.toLocaleString()
      : obj.target;
    countEl.textContent = `${displayCurrent}/${displayTarget}`;
    countEl.className = 'obj-count' + (obj.current >= obj.target ? ' done' : '');
  }

  function showObjectiveComplete() {
    const el = document.createElement('div');
    el.className = 'obj-complete-flash';
    el.style.background = 'radial-gradient(ellipse at center, rgba(0,255,136,0.2) 0%, transparent 70%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 600);
  }

  let comboTimer = null;
  function resetComboTimer() {
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { combo = 0; updateHUD(); }, 3000);
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let writePos = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== -1) {
          grid[writePos][c] = grid[r][c];
          if (writePos !== r) grid[r][c] = -1;
          writePos--;
        }
      }
      for (let r = writePos; r >= 0; r--) grid[r][c] = -1;
    }
  }

  function fillEmpty() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c] === -1) grid[r][c] = Math.floor(Math.random() * COLORS);
  }

  function levelUp() {
    level++;
    levelScore = 0;
    levelTarget = Math.floor(levelTarget * 1.5);

    // 经典模式：进入下一关，重置目标
    if (mode === 'classic') {
      moves += 5;
      objectiveComplete = false;
      colorCounts = [0,0,0,0,0,0];
      objective = Objectives.getObjective(level);
      updateObjectiveDisplay();
    }

    SFX.levelUp();
    showLevelUpBanner();
    showScreenFlash(-1);
  }

  function showLevelUpBanner() {
    const el = document.createElement('div');
    el.className = 'level-up-banner';
    el.innerHTML = `<div class="lu-title">LEVEL ${level}</div><div class="lu-sub">+5 步数</div>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }

  function checkGameOver() {
    if (gameOver) return;
    if (mode === 'classic' && moves <= 0) { endGame(); return; }

    let hasMove = false;
    for (let r = 0; r < ROWS && !hasMove; r++)
      for (let c = 0; c < COLS && !hasMove; c++)
        if (findGroup(r, c).length >= 2) hasMove = true;

    if (!hasMove) shuffleBoard();
  }

  function shuffleBoard() {
    const colors = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) colors.push(grid[r][c]);

    for (let i = colors.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [colors[i], colors[j]] = [colors[j], colors[i]];
    }

    let idx = 0;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) grid[r][c] = colors[idx++];

    render();

    let hasMove = false;
    for (let r = 0; r < ROWS && !hasMove; r++)
      for (let c = 0; c < COLS && !hasMove; c++)
        if (findGroup(r, c).length >= 2) hasMove = true;

    if (!hasMove) endGame();
  }

  function endGame() {
    gameOver = true;
    SFX.fail();
    setTimeout(() => showResult(), 500);
  }

  function showResult() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    const completed = objectiveComplete;
    document.getElementById('result-title').textContent =
      completed ? 'EXCELLENT!' : score >= 2000 ? 'WELL DONE' : 'GAME OVER';
    document.getElementById('result-subtitle').textContent =
      mode === 'classic'
        ? (completed ? `关卡 ${level} 目标达成！` : `关卡 ${level} · 经典模式`)
        : '无尽模式';

    document.getElementById('result-score').textContent = score.toLocaleString();
    document.getElementById('result-combo').textContent = maxCombo + 'x';
    document.getElementById('result-blocks').textContent = totalBlocks;
    document.getElementById('result-level').textContent = level;

    const stars = score >= 5000 ? 3 : score >= 2000 ? 2 : score >= 500 ? 1 : 0;
    document.getElementById('result-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

    const key = `neon-crush-highscore-${mode}`;
    const prev = parseInt(localStorage.getItem(key) || '0');
    const isNewRecord = score > prev;
    if (isNewRecord) localStorage.setItem(key, String(score));
    document.getElementById('result-record').style.display = isNewRecord ? 'block' : 'none';

    document.getElementById('result-retry').onclick = () => start(mode);
  }

  function updateHUD() {
    document.getElementById('hud-score').textContent = score.toLocaleString();
    document.getElementById('hud-combo').textContent = combo > 0 ? combo + 'x' : '—';
    document.getElementById('hud-level').textContent = level;
    document.getElementById('hud-moves').textContent = mode === 'endless' ? '∞' : moves;

    const pct = Math.min((levelScore / levelTarget) * 100, 100);
    document.getElementById('level-progress').style.width = pct + '%';
  }

  function showScoreFloat(row, col, points) {
    const boardRect = boardEl.getBoundingClientRect();
    const cellW = boardRect.width / COLS;
    const cellH = boardRect.height / ROWS;
    const el = document.createElement('div');
    el.className = 'score-float';
    el.textContent = '+' + points;
    el.style.left = (boardRect.left + col * cellW + cellW / 2) + 'px';
    el.style.top = (boardRect.top + row * cellH) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function showComboPopup(c) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.textContent = c + 'x COMBO!';
    el.style.left = '50%'; el.style.top = '40%';
    el.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function showScreenFlash(colorIdx) {
    const colors = ['rgba(255,45,122,0.15)','rgba(0,212,255,0.15)','rgba(0,255,136,0.15)',
                    'rgba(180,74,255,0.15)','rgba(255,136,0,0.15)','rgba(255,221,0,0.15)'];
    const c = colorIdx >= 0 && colorIdx < colors.length ? colors[colorIdx] : 'rgba(255,255,255,0.1)';
    const el = document.createElement('div');
    el.className = 'screen-flash';
    el.style.background = `radial-gradient(ellipse at center, ${c} 0%, transparent 70%)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 300);
  }

  function pause() {
    if (gameOver) return;
    if (confirm('暂停中\n\n返回主菜单？')) toMenu();
  }

  function toMenu() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('menu-screen').classList.remove('hidden');
    updateHighscoreDisplay();
  }

  function updateHighscoreDisplay() {
    const ch = parseInt(localStorage.getItem('neon-crush-highscore-classic') || '0');
    const eh = parseInt(localStorage.getItem('neon-crush-highscore-endless') || '0');
    const el = document.getElementById('menu-highscore');
    let html = '';
    if (ch > 0) html += `经典最高分 <strong>${ch.toLocaleString()}</strong>`;
    if (ch > 0 && eh > 0) html += ' · ';
    if (eh > 0) html += `无尽最高分 <strong>${eh.toLocaleString()}</strong>`;
    el.innerHTML = html || '点击开始你的第一局游戏';
  }

  // 主菜单展示宝石
  const menuGemsEl = document.getElementById('menu-gems');
  GemSVG.getAll().forEach(svg => {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = svg;
    menuGemsEl.appendChild(wrapper.firstElementChild);
  });

  updateHighscoreDisplay();

  window.addEventListener('resize', () => {
    if (document.getElementById('game-screen').style.display === 'flex') {
      boardEl.style.width = Math.min(window.innerWidth - 24, 420) + 'px';
    }
  });

  return { start, pause, toMenu };
})();
</script>
</body>
</html>
